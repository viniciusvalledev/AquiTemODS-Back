<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        font-family: "Poppins", Arial, sans-serif;
        color: #374151;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      .logo-container {
        text-align: center;
        margin-bottom: 40px;
      }
      .brand-line {
        height: 4px;
        width: 60px;
        background-color: #d7386e;
        margin: 0 auto 30px auto;
        border-radius: 2px;
      }
      h1 {
        color: #111827;
        font-size: 22px;
        font-weight: 600;
        text-align: center;
        margin-bottom: 20px;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 20px;
        color: #4b5563;
      }
      .highlight-box {
        background-color: #f9fafb;
        border-left: 4px solid #d7386e;
        padding: 15px 20px;
        margin: 30px 0;
        border-radius: 0 8px 8px 0;
      }
      .divider {
        border-top: 1px solid #e5e7eb;
        margin: 40px 0 20px 0;
      }
      .footer {
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img
          src="https://aquitemods.saquarema.rj.gov.br/Logo_aquitemods.png"
          alt="AquiTemODS"
          width="200"
          style="display: block; margin: 0 auto"
        />
      </div>
      <div class="brand-line"></div>
      <h1>Projeto Removido</h1>
      <p>Olá, <strong>[PREFEITURA]</strong>.</p>
      <p>
        Informamos que a sua solicitação para remover o projeto
        <strong>[NOME_PROJETO]</strong> da nossa plataforma foi concluída com
        sucesso.
      </p>
      <p>
        Lamentamos a sua partida e esperamos poder colaborar com você novamente
        no futuro.
      </p>
      <div class="divider"></div>
      <div class="footer">
        <p>&copy; 2026 AquiTemODS.</p>
        <p>Por favor, não responder este email.</p>
      </div>
    </div>
  </body>
</html>
